name: Trend Radar — Varredura Contínua

on:
  schedule:
    # A cada 15min. O endpoint só DISPARA as marcas que "venceram" o próprio
    # intervalo_horas (cadência por cliente) — então esta frequência é só o
    # tique do relógio; quem decide se dispara é o intervalo de cada marca.
    # Ticks curtos importam porque a coleta agora é assíncrona: cada tick também
    # FINALIZA os scrapes que ficaram prontos desde o anterior, então */15
    # reduz a latência entre "run da Apify terminou" e "drops salvos".
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger Radar API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/radar/run" \
            -H "Authorization: Bearer ${{ secrets.RADAR_CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Status: $response"
          if [ "$response" != "200" ]; then
            echo "Falha — status $response"
            exit 1
          fi
